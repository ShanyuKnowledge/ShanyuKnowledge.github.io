<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>山屿智能文档中心</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css?v=20240115">
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '山屿智能文档中心',
      repo: 'https://github.com/ShanyuKnowledge/ShanyuKnowledge.github.io',
      loadSidebar: true,
      maxLevel: 3,
      subMaxLevel: 2,
      auto2top: true,
      homepage: 'README.md',
      hideSidebar: false,
      alias: {
        '/_sidebar.md': '/_sidebar.md'
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js?v=20240115"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js?v=20240115"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-sidebar-collapse@1/lib/docsify-sidebar-collapse.min.js?v=20240115"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js?v=20240115"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js?v=20240115"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-ruby.min.js?v=20240115"></script>
</body>
</html>
