<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>山屿智能文档中心</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4.13.0/lib/themes/vue.css">
  <style>
    .sidebar-nav ul {
      padding-left: 20px;
      margin: 0;
    }
    .sidebar-nav li {
      list-style: none;
      margin: 2px 0;
    }
    .sidebar-nav li > a {
      cursor: pointer;
      user-select: none;
    }
    .sidebar-nav li.collapsible > a::before {
      content: '▶';
      font-size: 10px;
      margin-right: 6px;
      color: #999;
      display: inline-block;
      transition: transform 0.2s;
    }
    .sidebar-nav li.collapsible.open > a::before {
      transform: rotate(90deg);
    }
    .sidebar-nav li.collapsible > ul {
      display: none;
    }
    .sidebar-nav li.collapsible.open > ul {
      display: block;
    }
    .sidebar-nav li:not(.collapsible) > a::before {
      content: '•';
      font-size: 10px;
      margin-right: 6px;
      color: #ccc;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '山屿智能文档中心',
      repo: 'https://github.com/ShanyuKnowledge/ShanyuKnowledge.github.io',
      loadSidebar: '_sidebar.md',
      maxLevel: 3,
      homepage: 'README.md',
      auto2top: true,
      search: {
        depth: 3
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.0/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.0/lib/plugins/search.min.js"></script>
  <script>
    window.$docsify.plugins = [
      function(hook, vm) {
        hook.doneEach(function() {
          var sidebar = document.querySelector('.sidebar-nav');
          if (sidebar) {
            var items = sidebar.querySelectorAll('li');
            items.forEach(function(item) {
              var link = item.querySelector('a');
              var sublist = item.querySelector('ul');
              if (link && sublist) {
                item.classList.add('collapsible');
                item.classList.add('open');
                link.addEventListener('click', function(e) {
                  if (item.classList.contains('collapsible')) {
                    e.preventDefault();
                    item.classList.toggle('open');
                  }
                });
              }
            });
          }
        });
      }
    ];
  </script>
</body>
</html>
