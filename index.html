<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>山屿智能文档中心</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4.13.0/lib/themes/vue.css">
  <style>
    .sidebar-nav {
      padding-left: 10px;
    }
    .sidebar-nav li {
      list-style: none;
    }
    .sidebar-nav li.active > ul {
      display: block;
    }
    .sidebar-nav li > ul {
      display: none;
    }
    .sidebar-nav li > a + ul {
      padding-left: 20px;
    }
    .sidebar-nav li > a {
      cursor: pointer;
      display: flex;
      align-items: center;
    }
    .sidebar-nav li > a::before {
      content: '▶';
      font-size: 8px;
      margin-right: 5px;
      transition: transform 0.2s;
    }
    .sidebar-nav li.active > a::before {
      transform: rotate(90deg);
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '山屿智能文档中心',
      repo: 'https://github.com/ShanyuKnowledge/ShanyuKnowledge.github.io',
      loadSidebar: '_sidebar.md',
      maxLevel: 2,
      homepage: 'README.md',
      auto2top: true,
      search: {
        depth: 3
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.0/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.0/lib/plugins/search.min.js"></script>
  <script>
    window.$docsify.plugins = [
      function(hook, vm) {
        hook.doneEach(function() {
          var sidebar = document.querySelector('.sidebar-nav');
          if (sidebar) {
            var items = sidebar.querySelectorAll('li');
            items.forEach(function(item) {
              var link = item.querySelector('a');
              var sublist = item.querySelector('ul');
              if (link && sublist) {
                link.addEventListener('click', function(e) {
                  e.preventDefault();
                  item.classList.toggle('active');
                });
              }
            });
          }
        });
      }
    ];
  </script>
</body>
</html>
